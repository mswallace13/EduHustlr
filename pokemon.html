<h3>Pokemon Data Content:</h3>
<pre id="csv-content" style="background: #f4f4f4; padding: 15px; border: 1px solid #ddd;">
    Loading data...
</pre>

<script>
    const rawUrl = "https://raw.githubusercontent.com/mswallace13/EduHustlr/main/Pokemon.csv";

    fetch(rawUrl)
        .then(response => response.text())
        .then(data => {
            document.getElementById('csv-content').textContent = data;
        })
        .catch(error => {
            document.getElementById('csv-content').textContent = "Error loading CSV: " + error;
        });
</script>
