<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduHustlr | My Collection</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --card-inner: #1a1a1a;
            --holo: linear-gradient(45deg, transparent 25%, rgba(255,255,255,0.2) 50%, transparent 75%);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        h1 { font-family: 'Courier New', monospace; letter-spacing: 5px; margin-bottom: 10px; }
        p.subtitle { color: #888; margin-bottom: 40px; }

        #binder {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .pkmn-card {
            background-color: var(--card-inner);
            border: 2px solid #333;
            border-radius: 18px;
            padding: 15px;
            position: relative;
            overflow: hidden;
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s;
        }

        .pkmn-card:hover {
            transform: translateY(-10px) rotate(2deg);
            box-shadow: 0 15px 30px rgba(255, 0, 0, 0.3);
            border-color: #ff0000;
        }

        .pkmn-card::after {
            content: "";
            position: absolute;
            top: -150%; left: -150%; width: 300%; height: 300%;
            background: var(--holo);
            transform: rotate(45deg);
            transition: 0.6s;
        }

        .pkmn-card:hover::after { top: 100%; left: 100%; }

        .pkmn-card img {
            width: 160px;
            height: 160px;
            margin-top: 10px;
        }

        .card-name {
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 15px 0 5px 0;
        }

        .type-badge {
            display: inline-block;
            background: #444;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .back-link { margin-top: 50px; color: #666; text-decoration: none; }
    </style>
</head>
<body>

    <h1>MY BINDER</h1>
    <p class="subtitle">A showcase of the cards I actually own.</p>

    <div id="binder">
        </div>

    <a href="index.html" class="back-link">← HUB</a>

    <script>
        // 1. LIST YOUR POKEMON HERE
        // Just add the names of the cards you own to this list!
        const myCollection = [
            'pikachu', 
            'charizard', 
            'mewtwo', 
            'lugia', 
            'rayquaza', 
            'umbreon'
        ];

        async function loadCollection() {
            const binder = document.getElementById('binder');

            for (const name of myCollection) {
                try {
                    const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
                    const data = await response.json();

                    const card = document.createElement('div');
                    card.className = 'pkmn-card';
                    
                    card.innerHTML = `
                        <div class="type-badge">${data.types[0].type.name}</div>
                        <br>
                        <img src="${data.sprites.other['official-artwork'].front_default}" alt="${data.name}">
                        <div class="card-name">${data.name}</div>
                        <div style="font-size: 0.8rem; color: #888;">NO. ${data.id}</div>
                    `;

                    binder.appendChild(card);
                } catch (err) {
                    console.error(`Could not load ${name}`);
                }
            }
        }

        // Run this function as soon as the page opens
        loadCollection();
    </script>
</body>
</html>
