<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #00171F; }
        
        /* Table Styling */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .data-table th {
            background-color: #000000;
            color: white;
            text-align: left;
            padding: 12px;
        }

        .data-table td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            color: #333;
        }

        .data-table tr:hover { background-color: #f1f1f1; }

        h2 { color: #222; }
    </style>
</head>
<body>

    <h2>My Collection</h2>
    <div id="table-container">Loading data into table...</div>

    <script>
        const rawUrl = "https://raw.githubusercontent.com/mswallace13/EduHustlr/main/Pokemon.csv";

        fetch(rawUrl)
            .then(res => res.text())
            .then(csvText => {
                const rows = csvText.trim().split("\n");
                let tableHtml = '<table class="data-table">';

                rows.forEach((row, index) => {
                    const columns = row.split(",");
                    const tag = (index === 0) ? "th" : "td"; // Use <th> for the first row
                    
                    tableHtml += "<tr>";
                    columns.forEach(col => {
                        tableHtml += `<${tag}>${col}</${tag}>`;
                    });
                    tableHtml += "</tr>";
                });

                tableHtml += "</table>";
                document.getElementById('table-container').innerHTML = tableHtml;
            });
    </script>

</body>
</html>
