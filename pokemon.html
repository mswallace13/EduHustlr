<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduHustlr - Pokémon TCG Explorer</title>
    <style>
        /* Simple styling to make it look professional */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            color: #333;
        }

        .card-container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        #pokemon-img {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 10px;
            margin-bottom: 1rem;
            transition: transform 0.3s ease;
        }

        #pokemon-img:hover {
            transform: scale(1.05);
        }

        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #e84118;
        }

        .info {
            margin-bottom: 1.5rem;
        }

        h1 { margin-bottom: 0.5rem; }
        p { color: #666; margin-top: 0; }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="info">
            <h1 id="pokemon-name">Loading...</h1>
            <p id="pokemon-rarity">Searching the tall grass...</p>
        </div>

        <img id="pokemon-img" src="" alt="Pokemon Card">

        <br>
        <button onclick="getPokemonCard()">Catch Another Card</button>
    </div>

    <script>
        // The API endpoint for a random card
        const url = "https://api.tcgdex.net/v2/en/random/card";

        async function getPokemonCard() {
            // Visual feedback while loading
            document.getElementById("pokemon-name").innerText = "Loading...";
            
            try {
                // 1. Fetch data from TCGdex
                const response = await fetch(url);
                
                // 2. Convert that data into a JSON object
                const card = await response.json();

                // 3. Update the HTML elements with our JSON data
                document.getElementById("pokemon-name").innerText = card.name;
                document.getElementById("pokemon-rarity").innerText = "Rarity: " + (card.rarity || "Unknown");
                
                // We add /high.png to get the high-quality version of the image
                document.getElementById("pokemon-img").src = card.image + "/high.png";

                // Log the whole object to the console so you can practice reading it!
                console.log("Here is the full JSON object:", card);

            } catch (error) {
                document.getElementById("pokemon-name").innerText = "Error!";
                console.error("Failed to fetch data:", error);
            }
        }

        // Run once on initial page load
        getPokemonCard();
    </script>

</body>
</html>
