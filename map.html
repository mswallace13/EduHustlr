<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where Am I?</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h1>Where in the World?</h1>
        <button onclick="findMe()">Locate Me</button>
        <p id="status"></p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize the map centered on the world
        const map = L.map('map').setView([20, 0], 2);

        // 2. Add the map style (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        function findMe() {
            const status = document.getElementById('status');
            
            if (!navigator.geolocation) {
                status.textContent = "Geolocation is not supported by your browser";
            } else {
                status.textContent = "Locating...";
                
                // 3. Get the user's actual coordinates
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    // 4. Update map view and add a marker
                    map.setView([lat, lon], 13);
                    L.marker([lat, lon]).addTo(map)
                        .bindPopup("<b>Found you!</b><br>Lat: " + lat.toFixed(2) + "<br>Lon: " + lon.toFixed(2))
                        .openPopup();
                    
                    status.textContent = "Location Found!";
                }, () => {
                    status.textContent = "Unable to retrieve your location (did you click block?)";
                });
            }
        }
    </script>
</body>
</html>
