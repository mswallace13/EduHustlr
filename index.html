<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduHustlr | Portal</title>
    <style>
        /* 1. Theme Variables */
        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #bb86fc; /* Subtle purple for links */
        }

        body.light-mode {
            --bg: #ffffff;
            --text: #000000;
            --accent: #6200ee;
        }

        /* 2. Core Styles */
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace; /* Tech/Minimalist vibe */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.4s, color 0.4s;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: center;
        }

        a {
            color: var(--text);
            text-decoration: none;
            font-size: 1.2rem;
            border: 1px solid var(--text);
            padding: 10px 40px;
            transition: 0.3s;
        }

        a:hover {
            background-color: var(--text);
            color: var(--bg);
        }

        /* 3. Toggle Button */
        #theme-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: 1px solid var(--text);
            color: var(--text);
            padding: 5px 15px;
            cursor: pointer;
        }
        .social-link {
    border-color: var(--accent); /* Uses that purple accent we set up earlier */
    margin-top: 20px; /* Separates it from the main project links */
    font-size: 0.9rem;
    opacity: 0.8;
}

.social-link:hover {
    opacity: 1;
    background-color: var(--accent);
    color: var(--bg);
}
    </style>
</head>
<body>

    <button id="theme-btn" onclick="toggleTheme()">LIGHT MODE</button>

    <h1>EduHustlr_dev</h1>

    <nav>
        <a href="pokemon.html">MY POKÉDEX</a>
        <a href="bucket.html">BUCKET LIST</a>
        <a href="music.html">MUSIC HUB</a>
        <a href="astros.html">ASTROS</a>
        <a href="map.html">MAP</a> 
        <a href="poke.html">FIND A POKEMON</a>
        <a href="lofi.html">LOFI</a>
        <a href="https://www.threads.net/@NEGRONERD" target="_blank" class="social-link">THREADS</a>
    </nav>

    <script>
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            
            body.classList.toggle('light-mode');
            
            if (body.classList.contains('light-mode')) {
                btn.textContent = "DARK MODE";
            } else {
                btn.textContent = "LIGHT MODE";
            }
        }
    </script>
</body>
</html>
